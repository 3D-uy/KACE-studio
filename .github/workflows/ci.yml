name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev \
          gir1.2-gtk-3.0
        sudo apt-get install -y gir1.2-webkit2-4.0 || sudo apt-get install -y gir1.2-webkit2-4.1

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Backend Tests
      run: |
        python -m pytest -v > pytest_run.log 2>&1
        cat pytest_run.log

    - name: Push logs on failure
      if: failure()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b ci-debug-logs || git checkout ci-debug-logs
        git add pytest_run.log
        git commit -m "ci: save failed test logs for ${{ matrix.os }} - Python ${{ matrix.python-version }} [skip ci]"
        git push origin ci-debug-logs --force

  build-windows:
    name: Build Windows Executable
    needs: test
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --clean -y main.spec

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KACE-studio-Windows
        path: dist/KACE-studio.exe
        if-no-files-found: error
